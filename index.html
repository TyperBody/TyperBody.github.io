<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TYPERBODY // 超频空间</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 动态背景 -->
    <div class="bg-container">
        <!-- 中心爆发光源 -->
        <div class="light-burst">
            <div class="light-core"></div>
            <div class="cross-beam-h"></div>
            <div class="cross-beam-v"></div>
            <div class="diagonal-beam"></div>
            <div class="diagonal-beam"></div>
            <div class="diagonal-beam"></div>
            <div class="diagonal-beam"></div>
            <div class="diagonal-beam"></div>
            <div class="diagonal-beam"></div>
            <div class="radial-rays" id="radial-rays"></div>
        </div>
        <div class="noise-overlay"></div>
        <div class="interference-lines" id="interference-lines"></div>
        <div class="scan-lines"></div>
        <div class="stars" id="stars"></div>
        <div class="floating-shapes" id="shapes"></div>
    </div>

    <!-- 故障效果覆盖层 -->
    <div class="glitch-overlay"></div>

    <!-- 首页 Hero - 独占一页 -->
    <section class="hero-fullpage">
        <div class="hero-center">
            <h1 class="hero-title" data-text="TYPERBODY">TYPERBODY</h1>
            <div class="hero-cn-title">超 频 空 间</div>
            <div class="hero-line"></div>
            <p class="hero-tagline">DIGITAL BOUNDARY // CYBER SPACE // 2024</p>
        </div>
        <div class="scroll-hint">
            <span class="scroll-text">SCROLL</span>
            <div class="scroll-arrow">▼</div>
        </div>
    </section>

    <!-- 导航栏 - 滚动后显示 -->
    <nav class="nav-bar nav-hidden" id="navbar">
        <div class="nav-logo">
            <span class="logo-text" data-text="TYPERBODY">TYPERBODY</span>
        </div>
        <div class="nav-links">
            <a href="#articles" class="nav-link">POSTS</a>
            <a href="#about" class="nav-link">ABOUT</a>
        </div>
    </nav>

    <!-- 主要内容区 -->
    <main class="main-content">
        <!-- 文章列表区域 -->
        <section class="articles-section" id="articles">
            <div class="section-header">
                <h2 class="section-title">
                    <span class="title-bracket">[</span>
                    LATEST_POSTS
                    <span class="title-bracket">]</span>
                </h2>
            </div>
            <div class="articles-grid" id="articles-grid">
                <div class="loading-indicator">
                    <div class="loading-spinner"></div>
                    <span>LOADING...</span>
                </div>
            </div>
        </section>

        <!-- 关于区域 -->
        <section class="about-section" id="about">
            <div class="section-header">
                <h2 class="section-title">
                    <span class="title-bracket">[</span>
                    ABOUT
                    <span class="title-bracket">]</span>
                </h2>
            </div>
            <div class="about-content">
                <div class="about-avatar">
                    <div class="avatar-frame">
                        <img src="https://github.com/TyperBody.png" alt="TyperBody" class="avatar-img">
                    </div>
                    <div class="avatar-name">TyperBody</div>
                </div>
                <div class="about-text">
                    <p class="about-desc">
                        Y2K HYPERTRANCE STYLE BLOG<br>
                        INSPIRED BY ELECTRONIC MUSIC AESTHETICS
                    </p>
                    <div class="about-links">
                        <a href="https://github.com/TyperBody" class="social-link" target="_blank">GITHUB</a>
                        <a href="https://twitter.com" class="social-link" target="_blank">TWITTER</a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="footer-line"></div>
        <div class="footer-content">
            <span>TYPERBODY 2026</span>
            <span class="footer-sep">//</span>
            <span>GITHUB PAGES</span>
        </div>
    </footer>

    <!-- 鼠标跟随效果 -->
    <div class="cursor-glow" id="cursor-glow"></div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
